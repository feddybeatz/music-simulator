
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC SUPERSTAR: ONLINE</title>
    <!-- Tailwind loaded via PostCSS build in production; removed CDN for safety -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #f0f0f0;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .neon-text {
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }
        .rhythm-lane {
            background: linear-gradient(180deg, rgba(139, 92, 246, 0.05) 0%, rgba(139, 92, 246, 0.15) 100%);
        }
        @keyframes note-fall {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(500px); opacity: 1; }
        }
    </style>
<!-- Removed importmap so Vite bundles local dependencies (React, framer-motion, etc.) -->
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
